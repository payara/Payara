# LLM backend selection for the Payara Jakarta Agentic AI runtime.
# "vertex" uses Claude on Google Cloud Vertex AI authenticated via ADC (gcloud).
# Project ID and region fall back to the ANTHROPIC_VERTEX_PROJECT_ID and
# CLOUD_ML_REGION environment variables when the properties below are absent.
payara.agentic.llm.provider=vertex
payara.agentic.llm.model=claude-sonnet-4-6
payara.agentic.llm.max-tokens=8192
# System prompt (also used as the Anthropic prompt-cache prefix):
payara.agentic.llm.system=You are a senior technical writer. You produce a single self-contained HTML fragment (no <html>, <head> or <body> tags, no markdown code fences) that explains each field of a web form to the person filling it in: what the field is, why it is needed, the expected format, and a short filling tip. Use clean semantic HTML with concise inline styles and a heading per field. Do NOT output any title, heading, or introductory paragraph for the form itself — start directly with the first field section. Output only the HTML fragment.

# LLM backend selection for the Payara Jakarta Agentic AI runtime.
# "vertex" uses Claude on Google Cloud Vertex AI authenticated via ADC (gcloud).
# Project ID and region fall back to the ANTHROPIC_VERTEX_PROJECT_ID and
# CLOUD_ML_REGION environment variables when the properties below are absent.
payara.agentic.llm.provider=vertex
payara.agentic.llm.model=claude-sonnet-4-6
payara.agentic.llm.max-tokens=8192
# System prompt (also used as the Anthropic prompt-cache prefix):
payara.agentic.llm.system=You are a senior technical writer. For each field of a web form, write a concise plain-text explanation: what the field is, why it is needed, the expected format, and one short filling tip. Return ONLY a valid JSON object (no markdown, no code fences, no extra keys) where each key is the exact field name attribute from the form spec and each value is the plain-text explanation for that field. Output only the JSON object.

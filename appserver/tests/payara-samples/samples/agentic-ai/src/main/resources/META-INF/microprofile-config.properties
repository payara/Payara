# LLM backend selection for the Payara Jakarta Agentic AI runtime.
# The flagship sample uses Anthropic (Claude) for high-quality HTML generation.
# Provide the API key via the ANTHROPIC_API_KEY environment variable.
payara.agentic.llm.provider=anthropic
payara.agentic.llm.model=claude-opus-4-8
payara.agentic.llm.max-tokens=8192
# System prompt (also used as the Anthropic prompt-cache prefix):
payara.agentic.llm.system=You are a senior technical writer. You produce a single self-contained HTML fragment (no <html>, <head> or <body> tags, no markdown code fences) that explains each field of a web form to the person filling it in: what the field is, why it is needed, the expected format, and a short filling tip. Use clean semantic HTML with concise inline styles and a heading per field. Output only the HTML fragment.

<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Azul Payara Server — Customer onboarding</title>
    <style>
        :root { --bg:#0f1420; --card:#161d2e; --line:#27314a; --ink:#e7ecf5; --muted:#9aa6bd; --accent:#3d7bff; }
        * { box-sizing: border-box; }
        body { margin:0; font-family: system-ui, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--ink); }
        header { padding:20px 28px; border-bottom:1px solid var(--line); }
        header h1 { margin:0; font-size:20px; }
        header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; padding:18px 28px; align-items:start; }
        .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; }
        .card h2 { margin:0 0 14px; font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
        label { display:block; margin:12px 0 4px; font-size:13px; }
        .req { color:#ff6b6b; }
        input, select, textarea { width:100%; padding:9px 10px; background:#0d1320; color:var(--ink);
            border:1px solid var(--line); border-radius:8px; font-size:14px; }
        textarea { min-height:90px; resize:vertical; }
        small.help { display:block; color:var(--muted); font-size:12px; margin-top:3px; }
        .actions { margin-top:18px; display:flex; gap:10px; align-items:center; }
        button { background:var(--accent); color:#fff; border:0; padding:10px 16px; border-radius:8px;
            font-size:14px; cursor:pointer; }
        button:disabled { opacity:.5; cursor:default; }
        #tutorial { background:#0d1320; border:1px solid var(--line); border-radius:8px; padding:16px; min-height:160px; }
        #tutorial .placeholder { color:var(--muted); }
        .chat { padding:0 28px 28px; }
        .chat .card { display:flex; flex-direction:column; gap:10px; }
        .chatlog { display:flex; flex-direction:column; gap:8px; max-height:200px; overflow:auto; }
        .msg { font-size:13px; padding:8px 10px; border-radius:8px; }
        .msg.you { background:#1c2640; align-self:flex-end; }
        .msg.agent { background:#13351f; align-self:flex-start; }
        .chatbar { display:flex; gap:10px; }
        .chatbar input { flex:1; }
        .status { color:var(--muted); font-size:13px; }
    </style>
</head>
<body>
<header>
    <h1>Azul Payara Server — Customer onboarding</h1>
    <p>The field guide on the right is generated by a Jakarta Agentic AI agent. Use the chat to refine it.</p>
</header>

<div class="grid">
    <section class="card">
        <h2>Registration form</h2>
        <form id="customerForm" onsubmit="return false;"></form>
    </section>

    <section class="card">
        <h2>Field guide (generated)</h2>
        <div id="tutorial"><span class="placeholder">No tutorial yet — click “Generate tutorial”.</span></div>
        <div class="actions">
            <button id="genBtn" onclick="generate()">Generate tutorial</button>
            <span class="status" id="status"></span>
        </div>
    </section>
</div>

<div class="chat">
    <section class="card">
        <h2>Refine with the agent</h2>
        <div class="chatlog" id="chatlog"></div>
        <div class="chatbar">
            <input id="chatInput" type="text" placeholder="e.g. Make the business email explanation friendlier and add an example"/>
            <button id="refineBtn" onclick="refine()">Send</button>
        </div>
    </section>
</div>

<script>
    const $ = (id) => document.getElementById(id);

    async function loadForm() {
        const spec = await (await fetch('api/form')).json();
        const f = $('customerForm');
        f.innerHTML = '';
        for (const field of spec.fields) {
            const label = document.createElement('label');
            label.textContent = field.label;
            if (field.required) {
                const r = document.createElement('span');
                r.className = 'req'; r.textContent = ' *';
                label.appendChild(r);
            }
            f.appendChild(label);

            let control;
            if (field.type === 'select') {
                control = document.createElement('select');
                for (const opt of field.options) {
                    const o = document.createElement('option');
                    o.textContent = opt; control.appendChild(o);
                }
            } else if (field.type === 'textarea') {
                control = document.createElement('textarea');
            } else {
                control = document.createElement('input');
                control.type = field.type;
            }
            control.name = field.name;
            f.appendChild(control);

            if (field.help) {
                const h = document.createElement('small');
                h.className = 'help'; h.textContent = field.help;
                f.appendChild(h);
            }
        }
    }

    async function loadTutorial() {
        const html = await (await fetch('api/tutorial')).text();
        if (html && html.trim()) $('tutorial').innerHTML = html;
    }

    function busy(on, msg) {
        $('genBtn').disabled = on;
        $('refineBtn').disabled = on;
        $('status').textContent = msg || '';
    }

    async function generate() {
        busy(true, 'Generating…');
        try {
            const html = await (await fetch('api/tutorial/generate', { method: 'POST' })).text();
            $('tutorial').innerHTML = html;
            $('status').textContent = 'Done.';
        } catch (e) {
            $('status').textContent = 'Error: ' + e;
        } finally {
            $('genBtn').disabled = false;
            $('refineBtn').disabled = false;
        }
    }

    function addMsg(cls, text) {
        const m = document.createElement('div');
        m.className = 'msg ' + cls; m.textContent = text;
        $('chatlog').appendChild(m);
        $('chatlog').scrollTop = $('chatlog').scrollHeight;
    }

    async function refine() {
        const instruction = $('chatInput').value.trim();
        if (!instruction) return;
        addMsg('you', instruction);
        $('chatInput').value = '';
        busy(true, 'Refining…');
        try {
            const html = await (await fetch('api/tutorial/refine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instruction })
            })).text();
            $('tutorial').innerHTML = html;
            addMsg('agent', 'Updated the field guide.');
            $('status').textContent = 'Done.';
        } catch (e) {
            addMsg('agent', 'Error: ' + e);
        } finally {
            $('genBtn').disabled = false;
            $('refineBtn').disabled = false;
        }
    }

    $('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') refine(); });
    loadForm();
    loadTutorial();
</script>
</body>
</html>

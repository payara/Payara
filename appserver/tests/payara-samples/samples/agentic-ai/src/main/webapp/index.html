<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Azul Payara Server — Customer onboarding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --navy:   #0a1628;
            --blue:   #0055cc;
            --blue-h: #0044aa;
            --bg:     #f0f4f8;
            --card:   #ffffff;
            --border: #dde3ed;
            --ink:    #1a2535;
            --muted:  #64748b;
            --req:    #dc2626;
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }

        /* ── Header ── */
        header {
            background: var(--navy);
            padding: 0 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            height: 64px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -.5px;
        }
        .logo span { color: #3d9bff; }
        .header-sub {
            color: #8fa8c8;
            font-size: 13px;
            padding-left: 24px;
            border-left: 1px solid #1e3256;
        }

        /* ── Layout ── */
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:24px 32px; align-items:start; }

        /* ── Cards ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(10,22,40,.06);
        }
        .card h2 {
            margin: 0 0 16px;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        /* ── Form controls ── */
        label { display:block; margin: 14px 0 5px; font-size:13px; font-weight:500; color:var(--ink); }
        label:first-of-type { margin-top: 0; }
        .req { color: var(--req); }
        input, select, textarea {
            width: 100%;
            padding: 9px 12px;
            background: #fff;
            color: var(--ink);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color .15s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,85,204,.1); }
        textarea { min-height: 90px; resize: vertical; }
        small.help { display:block; color:var(--muted); font-size:12px; margin-top:4px; }

        /* ── Buttons ── */
        .actions { margin-top: 20px; display:flex; gap:10px; align-items:center; }
        button {
            background: var(--blue);
            color: #fff;
            border: 0;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .15s;
        }
        button:hover:not(:disabled) { background: var(--blue-h); }
        button:disabled { opacity: .45; cursor: default; }
        button.secondary {
            background: transparent;
            color: var(--blue);
            border: 1.5px solid var(--blue);
        }
        button.secondary:hover:not(:disabled) { background: #e8f0fe; }

        /* ── Tutorial pane ── */
        #tutorial {
            background: #f8fafc;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            min-height: 160px;
            line-height: 1.6;
        }
        #tutorial .placeholder { color: var(--muted); }

        /* ── Chat ── */
        .chat { padding: 0 32px 32px; }
        .chat .card { display:flex; flex-direction:column; gap:12px; }
        .chatlog { display:flex; flex-direction:column; gap:8px; max-height:200px; overflow:auto; }
        .msg { font-size:13px; padding:9px 13px; border-radius:20px; max-width:75%; }
        .msg.you { background:var(--blue); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
        .msg.agent { background:#e8f0fe; color:var(--ink); align-self:flex-start; border-bottom-left-radius:4px; }
        .chatbar { display:flex; gap:10px; }
        .chatbar input { flex:1; }
        .status { color:var(--muted); font-size:13px; }
    </style>
</head>
<body>
<header>
    <div class="logo">A<span>Z</span>UL</div>
    <p class="header-sub">Customer onboarding &mdash; field guide powered by Jakarta Agentic AI</p>
</header>

<div class="grid">
    <section class="card">
        <h2>Registration form</h2>
        <form id="customerForm" onsubmit="return false;"></form>
    </section>

    <section class="card">
        <h2>Field guide (generated)</h2>
        <div id="tutorial"><span class="placeholder">No tutorial yet — click “Generate tutorial”.</span></div>
        <div class="actions">
            <button id="genBtn" onclick="generate()">Generate tutorial</button>
            <span class="status" id="status"></span>
        </div>
    </section>
</div>

<div class="chat">
    <section class="card">
        <h2>Refine with the agent</h2>
        <div class="chatlog" id="chatlog"></div>
        <div class="chatbar">
            <input id="chatInput" type="text" placeholder="e.g. Make the business email explanation friendlier and add an example"/>
            <button id="refineBtn" onclick="refine()">Send</button>
        </div>
    </section>
</div>

<script>
    const $ = (id) => document.getElementById(id);

    async function loadForm() {
        const spec = await (await fetch('api/form')).json();
        const f = $('customerForm');
        f.innerHTML = '';
        for (const field of spec.fields) {
            const label = document.createElement('label');
            label.textContent = field.label;
            if (field.required) {
                const r = document.createElement('span');
                r.className = 'req'; r.textContent = ' *';
                label.appendChild(r);
            }
            f.appendChild(label);

            let control;
            if (field.type === 'select') {
                control = document.createElement('select');
                for (const opt of field.options) {
                    const o = document.createElement('option');
                    o.textContent = opt; control.appendChild(o);
                }
            } else if (field.type === 'textarea') {
                control = document.createElement('textarea');
            } else {
                control = document.createElement('input');
                control.type = field.type;
            }
            control.name = field.name;
            f.appendChild(control);

            if (field.help) {
                const h = document.createElement('small');
                h.className = 'help'; h.textContent = field.help;
                f.appendChild(h);
            }
        }
    }

    async function loadTutorial() {
        const html = await (await fetch('api/tutorial')).text();
        if (html && html.trim()) $('tutorial').innerHTML = html;
    }

    function busy(on, msg) {
        $('genBtn').disabled = on;
        $('refineBtn').disabled = on;
        $('status').textContent = msg || '';
    }

    async function generate() {
        busy(true, 'Generating…');
        try {
            const html = await (await fetch('api/tutorial/generate', { method: 'POST' })).text();
            $('tutorial').innerHTML = html;
            $('status').textContent = 'Done.';
        } catch (e) {
            $('status').textContent = 'Error: ' + e;
        } finally {
            $('genBtn').disabled = false;
            $('refineBtn').disabled = false;
        }
    }

    function addMsg(cls, text) {
        const m = document.createElement('div');
        m.className = 'msg ' + cls; m.textContent = text;
        $('chatlog').appendChild(m);
        $('chatlog').scrollTop = $('chatlog').scrollHeight;
    }

    async function refine() {
        const instruction = $('chatInput').value.trim();
        if (!instruction) return;
        addMsg('you', instruction);
        $('chatInput').value = '';
        busy(true, 'Refining…');
        try {
            const html = await (await fetch('api/tutorial/refine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instruction })
            })).text();
            $('tutorial').innerHTML = html;
            addMsg('agent', 'Updated the field guide.');
            $('status').textContent = 'Done.';
        } catch (e) {
            addMsg('agent', 'Error: ' + e);
        } finally {
            $('genBtn').disabled = false;
            $('refineBtn').disabled = false;
        }
    }

    $('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') refine(); });
    loadForm();
    loadTutorial();
</script>
</body>
</html>
